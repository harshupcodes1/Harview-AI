<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="48" height="48" rx="13" fill="url(#grad1)"/>
  <!-- Inner highlight -->
  <rect x="1" y="1" width="46" height="23" rx="12" fill="white" fill-opacity="0.07"/>
  <!-- Circuit nodes -->
  <circle cx="10" cy="24" r="2.5" fill="url(#grad2)"/>
  <circle cx="38" cy="24" r="2.5" fill="url(#grad2)"/>
  <circle cx="24" cy="10" r="2.5" fill="url(#grad2)"/>
  <circle cx="24" cy="38" r="2.5" fill="url(#grad2)"/>
  <!-- Circuit connecting lines -->
  <line x1="12.5" y1="24" x2="17" y2="24" stroke="white" stroke-opacity="0.4" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="31" y1="24" x2="35.5" y2="24" stroke="white" stroke-opacity="0.4" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="24" y1="12.5" x2="24" y2="17" stroke="white" stroke-opacity="0.4" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="24" y1="31" x2="24" y2="35.5" stroke="white" stroke-opacity="0.4" stroke-width="1.2" stroke-linecap="round"/>
  <!-- H letter: left vertical bar -->
  <rect x="15" y="15" width="4.5" height="18" rx="2" fill="white"/>
  <!-- H letter: right vertical bar -->
  <rect x="28.5" y="15" width="4.5" height="18" rx="2" fill="white"/>
  <!-- H letter: horizontal crossbar -->
  <rect x="15" y="21.75" width="18" height="4.5" rx="2" fill="white" fill-opacity="0.9"/>
  <!-- Accent dot -->
  <circle cx="39" cy="9" r="3" fill="#60A5FA" fill-opacity="0.85"/>
</svg>
